name: Deploy Spring Boot to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: /home/runner/work/Devops-Project/Devops-Project/target/dependency-check-report.html

      - name: SonarQube Analysis
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.organization=${{ secrets.ORGANIZATION }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Backup current JAR on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p /opt/chatbot/backup
            cp /opt/chatbot/target/chatbot-0.0.1-SNAPSHOT.jar \
               /opt/chatbot/backup/chatbot-backup.jar || true

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/chatbot-0.0.1-SNAPSHOT.jar"
          target: "/opt/chatbot"

      - name: Deploy Spring Boot Service (with rollback)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            
            sudo systemctl restart chatbot
            sleep 15

            echo "Step 3: Health check"
            if curl -f http://localhost:8080/actuator/health; then
              echo "Deployment successful"
              exit 0
            fi

            echo "❌ Deployment failed - Rolling back..."

            # Step 4: Rollback
            cp /opt/chatbot/backup/chatbot-backup.jar \
               /opt/chatbot/target/chatbot-0.0.1-SNAPSHOT.jar

            sudo systemctl restart chatbot

            echo "Rollback completed"
            exit 1

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Deployment SUCCESS - Spring Boot App"
          to: ${{ secrets.EMAIL_TO }}
          from: "CI/CD Pipeline"
          body: |
            Deployment completed successfully.

            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Branch: main

            OWASP report is attached.

          attachments: ${{ github.workspace }}/target/dependency-check-report.html