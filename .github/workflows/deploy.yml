name: Deploy Spring Boot to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/java-app"

      - name: Run App on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/java-app/target
            PID=$(pgrep -f "chatbot-0.0.1-SNAPSHOT.jar" || true)
  
            if [ ! -z "$PID" ]; then
            echo "Stopping old app: $PID"
            kill $PID || true
            sleep 3
            kill -9 $PID || true
            fi
            
            echo "Starting new app..."
            setsid java -jar chatbot-0.0.1-SNAPSHOT.jar > app.log 2>&1 < /dev/null &